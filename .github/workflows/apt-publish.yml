name: Build .deb and Publish APT Repository

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb and reprepro
        run: |
          cargo install cargo-deb
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .deb
        run: cargo deb

      - name: Create APT repository with reprepro
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions <<EOF
          Origin: Ecopower
          Label: Ecopower
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          SignWith: ${{ steps.import_gpg.outputs.fingerprint || 'true' }}
          EOF

          # Include .deb vào repository
          reprepro --basedir repo includedeb stable target/debian/ecopower_*.deb

          # Copy public key
          gpg --armor --export > repo/pubkey.gpg

      - name: Create simple index.html for browser
        run: |
          cat > repo/index.html <<EOF
          <!DOCTYPE html>
          <html><head><title>Ecopower APT Repository</title></head>
          <body>
            <h1>Ecopower APT Repository</h1>
            <p>Repository for Ecopower system monitor.</p>
            <p><strong>Public key:</strong> <a href="pubkey.gpg">pubkey.gpg</a></p>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          # Không dùng force_orphan để giữ cấu trúc
