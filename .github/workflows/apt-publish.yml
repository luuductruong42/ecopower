name: Build .deb and Publish APT Repository

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb and reprepro
        run: |
          cargo install cargo-deb
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Create APT repository structure with reprepro
        run: |
          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions <<EOF
          Origin: Ecopower
          Label: Ecopower
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          SignWith: ${{ steps.import_gpg.outputs.fingerprint }}
          EOF

          # Include the built .deb
          reprepro --basedir apt-repo includedeb stable target/debian/ecopower_*.deb

          # Copy public key
          cp $HOME/.gnupg/pubring.gpg apt-repo/pubkey.gpg

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: ./
          publish_branch: gh-pages
          force_orphan: true
